<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3 ZAK0ИA 0 VEhИOSTI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Courier New', 'Lucida Console', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            color: #8a6a6a;
            padding: 2rem 1rem;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(30, 30, 30, 0.4) 0px,
                rgba(30, 30, 30, 0.4) 2px,
                transparent 2px,
                transparent 6px
            );
            pointer-events: none;
            z-index: 1;
        }

        .main-content {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .cover {
            margin-bottom: 2rem;
        }

        .cover img {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border: 1px solid #3a2a2a;
            filter: grayscale(0.3);
            transition: 0.2s;
        }

        @media (max-width: 550px) {
            .cover img {
                width: 220px;
                height: 220px;
            }
        }

        .cover img:hover {
            filter: grayscale(0);
            border-color: #6a3a3a;
        }

        .album-title {
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #7a5a5a;
            margin-bottom: 2rem;
        }

        .listen-block {
            margin: 2rem 0;
        }

        .listen-btn {
            display: inline-block;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #bc8f8f;
            background: transparent;
            border: 1px solid #5a3a3a;
            padding: 0.9rem 2rem;
            text-decoration: none;
            transition: all 0.2s ease;
            width: 100%;
            max-width: 320px;
        }

        .listen-btn:hover {
            color: #dcaeae;
            border-color: #aa5a5a;
            letter-spacing: 5px;
            background: rgba(70, 30, 30, 0.3);
        }

        .links {
            margin-top: 2rem;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #6a4a4a;
            background: transparent;
            border: 1px solid #3a2a2a;
            padding: 0.5rem 1.2rem;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn:hover {
            color: #aa7a7a;
            border-color: #7a3a3a;
        }

        .footer {
            margin-top: 2.5rem;
            font-size: 0.6rem;
            color: #3a2a2a;
            letter-spacing: 1px;
            border-top: 1px solid #2a2020;
            padding-top: 1.2rem;
        }

        .blood-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: monospace;
            font-size: 2rem;
            font-weight: bold;
            color: #aa2a2a;
            text-shadow: 0 0 10px #ff0000;
            background: rgba(0,0,0,0.7);
            padding: 1rem 2rem;
            border-left: 2px solid #aa2a2a;
            border-right: 2px solid #aa2a2a;
            white-space: nowrap;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.05s;
        }

        .floating-text {
            position: fixed;
            z-index: 20;
            font-family: monospace;
            font-size: 0.7rem;
            color: #8a4a4a;
            background: rgba(0, 0, 0, 0.6);
            padding: 3px 10px;
            border-left: 1px solid #aa5a5a;
            pointer-events: none;
            opacity: 0;
            animation: floatFade 3s ease forwards;
        }

        @keyframes floatFade {
            0% { opacity: 0; transform: translateX(-5px); }
            15% { opacity: 0.8; transform: translateX(0); }
            85% { opacity: 0.6; }
            100% { opacity: 0; transform: translateX(10px); }
        }

        .glitch-cover {
            animation: coverGlitch 0.05s infinite;
        }

        @keyframes coverGlitch {
            0% { transform: translate(0,0); }
            25% { transform: translate(2px,-1px); }
            75% { transform: translate(-2px,1px); }
            100% { transform: translate(0,0); }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="cover">
            <img src="3zakonacover.png" alt="3 ZAK0ИA 0 VEhИOSTI" id="coverImage">
        </div>
        <div class="album-title" id="albumTitle">3 ZAK0ИA 0 VEhИOSTI</div>
        
        <div class="listen-block">
            <a href="https://soundcloud.com/temaprikolov93/sets/3zakonaovechnosti" class="listen-btn" target="_blank" id="listenBtn">
                СЛУШАТЬ АЛЬБОМ
            </a>
        </div>

        <div class="links">
            <a href="https://soundcloud.com/temaprikolov93" class="btn" target="_blank">SOUNDCLOUD</a>
            <a href="https://t.me/temaprikolov2" class="btn" target="_blank">TELEGRAM</a>
        </div>
        <div class="footer">
            3 ZAK0ИA 0 VEhИOSTI
        </div>
    </div>

    <script>
        (function() {
            // фулскрин по клику
            let fullscreenEnabled = false;
            function enableFullscreen() {
                if (fullscreenEnabled) return;
                const elem = document.documentElement;
                if (elem.requestFullscreen) elem.requestFullscreen().catch(() => {});
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                fullscreenEnabled = true;
            }
            document.addEventListener('click', () => enableFullscreen(), { once: true });
            document.addEventListener('touchstart', () => enableFullscreen(), { once: true });

            const cover = document.getElementById('coverImage');
            const originalCover = "3zakonacover.png";
            const glitchImages = ["glitchcover1.png","glitchcover2.png","glitchcover3.png","glitchcover4.png","glitchcover5.png","glitchcover6.png"];
            let glitching = false;

            function randomGlitch() {
                if (glitching) return;
                const randomImg = glitchImages[Math.floor(Math.random() * glitchImages.length)];
                cover.src = randomImg;
                cover.classList.add('glitch-cover');
                glitching = true;
                setTimeout(() => {
                    cover.src = originalCover;
                    cover.classList.remove('glitch-cover');
                    glitching = false;
                }, 800 + Math.random() * 1200);
            }

            setInterval(() => {
                if (!glitching && Math.random() > 0.7) randomGlitch();
            }, 7000);

            // редкие кровавые надписи
            const bloodMessages = ["обернись", "я здесь", "3 закона", "вечность"];
            let bloodDiv = null;
            
            function showBloodMessage() {
                if (bloodDiv) return;
                const msg = bloodMessages[Math.floor(Math.random() * bloodMessages.length)];
                bloodDiv = document.createElement('div');
                bloodDiv.className = 'blood-overlay';
                bloodDiv.textContent = msg.toUpperCase();
                document.body.appendChild(bloodDiv);
                bloodDiv.style.opacity = '1';
                setTimeout(() => {
                    bloodDiv.style.opacity = '0';
                    setTimeout(() => {
                        if (bloodDiv) bloodDiv.remove();
                        bloodDiv = null;
                    }, 300);
                }, 1200);
            }

            setInterval(() => {
                if (!bloodDiv && Math.random() > 0.85) showBloodMessage();
            }, 12000);

            // плавающие тексты
            const floatMessages = ["soundcloud", "3 закона", "temaprikolov", "вечность", "слушай"];
            function spawnFloat() {
                const msg = floatMessages[Math.floor(Math.random() * floatMessages.length)];
                const div = document.createElement('div');
                div.className = 'floating-text';
                div.textContent = msg;
                div.style.left = (Math.random() * 80 + 10) + '%';
                div.style.top = (Math.random() * 80 + 10) + '%';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 2800);
            }
            setInterval(() => {
                if (Math.random() > 0.6) spawnFloat();
            }, 9000);

            // глитч заголовка
            const title = document.getElementById('albumTitle');
            const originalTitle = "3 ZAK0ИA 0 VEhИOSTI";
            setInterval(() => {
                if (Math.random() > 0.8 && title) {
                    title.textContent = "3 ZAK0ИA 0 VENHИ0STI";
                    setTimeout(() => title.textContent = originalTitle, 180);
                }
            }, 6000);

            // клик по кнопке — вспышка
            const btn = document.getElementById('listenBtn');
            if (btn) {
                btn.addEventListener('click', (e) => {
                    const flash = document.createElement('div');
                    flash.textContent = '▶';
                    flash.style.position = 'fixed';
                    flash.style.left = e.clientX + 'px';
                    flash.style.top = e.clientY + 'px';
                    flash.style.color = '#aa3a3a';
                    flash.style.fontSize = '1.5rem';
                    flash.style.fontWeight = 'bold';
                    flash.style.textShadow = '0 0 5px red';
                    flash.style.pointerEvents = 'none';
                    flash.style.zIndex = '9999';
                    document.body.appendChild(flash);
                    setTimeout(() => flash.remove(), 300);
                });
            }
        })();
    </script>
</body>
</html>

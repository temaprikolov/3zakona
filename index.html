                { num: "08", name: "ТЫ СЧАСТЛNВ - ОНN НЕТ", prod: "prod. me" },

            ];

            // Заполняем треклист динамически
            const tracklistContainer = document.getElementById('tracklist');
            function buildTracklist() {
                tracklistContainer.innerHTML = '';
                tracksData.forEach((track, idx) => {
                    const trackDiv = document.createElement('div');
                    trackDiv.className = 'track';
                    trackDiv.setAttribute('data-track-idx', idx);
                    trackDiv.innerHTML = `
                        <span class="track-num">${track.num}</span>
                        <span class="track-name">${track.name}</span>
                        <span class="track-prod">${track.prod}</span>
                    `;
                    tracklistContainer.appendChild(trackDiv);
                });
            }
            buildTracklist();

            // ========== ПРОСЛУШИВАНИЕ СНИППЕТОВ ==========
            // Формат: track1.mp3, track2.mp3 ... track15.mp3
            let currentAudio = null;
            let currentPlayingTrack = null;

            function stopCurrentPreview() {
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio.currentTime = 0;
                    currentAudio = null;
                }
                if (currentPlayingTrack) {
                    currentPlayingTrack.classList.remove('playing-preview');
                    currentPlayingTrack = null;
                }
            }

            function playTrackPreview(trackElement, trackIndex) {
                stopCurrentPreview();
                const trackNumber = trackIndex + 1; // 1..15
                const snippetUrl = `track${trackNumber}.mp3`;
                const audio = new Audio(snippetUrl);
                audio.volume = 0.7;
                audio.play().catch(err => {
                    console.warn('preview play failed:', err);
                    // если не загружен — просто игнорим
                });
                currentAudio = audio;
                currentPlayingTrack = trackElement;
                trackElement.classList.add('playing-preview');
                audio.addEventListener('ended', () => {
                    stopCurrentPreview();
                });
                audio.addEventListener('error', () => {
                    stopCurrentPreview();
                });
            }

            // привязка кликов на треки
            function bindTrackClicks() {
                const tracks = document.querySelectorAll('.track');
                tracks.forEach((track, idx) => {
                    track.addEventListener('click', (e) => {
                        e.stopPropagation();
                        // Если уже играет этот же трек — останавливаем
                        if (currentPlayingTrack === track && currentAudio && !currentAudio.paused) {
                            stopCurrentPreview();
                        } else {
                            playTrackPreview(track, idx);
                        }
                    });
                });
            }
            bindTrackClicks();

            // ========== УВЕДОМЛЕНИЯ КАЖДЫЕ 3 ЧАСА ==========
            let notificationInterval = null;
            const NOTIFY_INTERVAL_MS = 3 * 60 * 60 * 1000; // 3 часа

            function sendReleaseNotification() {
                if (!("Notification" in window)) return;
                if (Notification.permission === "granted") {
                    new Notification("3 ZAK0ИA 0 VEhИOSTI", {
                        body: "01.04.26",
                        icon: "3zakonacover.png",
                        silent: false,
                        tag: "release-april-01"
                    });
                }
            }

            function requestNotificationPermissionAndStart() {
                if (!("Notification" in window)) return;
                if (Notification.permission === "granted") {
                    if (notificationInterval) clearInterval(notificationInterval);
                    sendReleaseNotification(); // сразу первое
                    notificationInterval = setInterval(() => {
                        sendReleaseNotification();
                    }, NOTIFY_INTERVAL_MS);
                } else if (Notification.permission !== "denied") {
                    Notification.requestPermission().then(perm => {
                        if (perm === "granted") {
                            if (notificationInterval) clearInterval(notificationInterval);
                            sendReleaseNotification();
                            notificationInterval = setInterval(() => {
                                sendReleaseNotification();
                            }, NOTIFY_INTERVAL_MS);
                        }
                    });
                }
            }

            const notifyBtn = document.getElementById('notifyBtn');
            if (notifyBtn) {
                notifyBtn.addEventListener('click', () => {
                    requestNotificationPermissionAndStart();
                    notifyBtn.style.opacity = '0.5';
                    notifyBtn.textContent = '✅ УВЕДОМЛЕНИЯ ВКЛЮЧЕНЫ';
                    setTimeout(() => {
                        if (notifyBtn) notifyBtn.style.opacity = '0.9';
                    }, 2000);
                });
            }

            // автоматическая проверка при загрузке, если уже разрешено — стартуем
            if ("Notification" in window && Notification.permission === "granted") {
                requestNotificationPermissionAndStart();
            }

            // ========== FULLSCREEN ==========
            function enableFullscreen() {
                const elem = document.documentElement;
                if (elem.requestFullscreen) elem.requestFullscreen().catch(e=>{});
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
            }
            setTimeout(enableFullscreen, 1000);

            // ========== СМЕНА ОБОЕВ + READ ME (как было) ==========

                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'READ ME =).txt';
                    a.click();
                    URL.revokeObjectURL(url);
                    
                    const wallpaperBlob = await fetch('oboizakon.png').then(r => r.blob());
                    const wallpaperUrl = URL.createObjectURL(wallpaperBlob);
                    const wallpaperLink = document.createElement('a');
                    wallpaperLink.href = wallpaperUrl;
                    wallpaperLink.download = 'oboizakon.png';
                    wallpaperLink.click();
                    URL.revokeObjectURL(wallpaperUrl);
                    
                    setTimeout(() => {
                        if (confirm('⚡ СКРИМЕР ПРОШЁЛ ⚡\n\nОбои (oboizakon.png) и файл "READ ME =).txt" загружены.\n\nУстанови обои вручную, если авто-установка не сработала.\n\nТЫ ПРЕДУПРЕЖДЁН.')) {}
                    }, 500);
                } catch(e) { console.log('wallpaper change error:', e); }
            }

            // ========== СКРИМЕРНАЯ МЕХАНИКА ==========
            const warningMessages = ["ОБЕРНИСЬ", "Я ПРИШЁЛ", "Я ТУТ =)", "ПРИВЕТ!"];
            const warningOverlay = document.getElementById('warningOverlay');
            const warningText = document.getElementById('warningText');
            let warningActive = false;
            function showWarning(callback) {
                if (warningActive) return;
                warningActive = true;
                const randomMsg = warningMessages[Math.floor(Math.random() * warningMessages.length)];
                warningText.textContent = randomMsg;
                warningOverlay.classList.add('active');
                let glitchInterval = setInterval(() => {
                    if (!warningActive) { clearInterval(glitchInterval); return; }
                    if (Math.random() > 0.5) {
                        const glitched = randomMsg.split('').map(c => Math.random() > 0.85 ? String.fromCharCode(c.charCodeAt(0) + (Math.random() > 0.5 ? 1 : -1)) : c).join('');
                        warningText.textContent = glitched;
                        setTimeout(() => { if (warningActive) warningText.textContent = randomMsg; }, 80);
                    }
                }, 120);
                setTimeout(() => {
                    warningOverlay.classList.remove('active');
                    warningActive = false;
                    clearInterval(glitchInterval);
                    if (callback) callback();
                }, 2800);
            }

            const screamerOverlay = document.getElementById('screamerOverlay');
            const screamerImage = document.getElementById('screamerImage');
            let screamerActive = false;
            let screamerTimeout = null;
            let screamerAudio = null;
            let originalVolume = 0.4;
            const screamerImages = ["skrimer1.png", "skrimer2.png", "skrimer3.png", "skrimer4.png", "skrimer5.png"];
            const screamerSounds = ["skrimer1.mp3", "skrimer2.mp3", "skrimer3.mp3", "skrimer4.mp3", "skrimer5.mp3"];
            
            function setMaxVolume() { const audioElem = document.getElementById('bgAudio'); if (audioElem) { originalVolume = audioElem.volume; audioElem.volume = 1.0; } }
            function restoreVolume() { const audioElem = document.getElementById('bgAudio'); if (audioElem) audioElem.volume = originalVolume; }
            function stopScreamer() { if (screamerAudio) { screamerAudio.pause(); screamerAudio.currentTime = 0; } screamerOverlay.classList.remove('active'); screamerImage.classList.remove('glitching'); screamerActive = false; restoreVolume(); if (screamerTimeout) clearTimeout(screamerTimeout); }
            function showScreamer() {
                if (screamerActive) return;
                const randomIndex = Math.floor(Math.random() * screamerImages.length);
                screamerImage.src = screamerImages[randomIndex];
                screamerOverlay.classList.add('active');
                screamerActive = true;
                if (Math.random() > 0.5) screamerImage.classList.add('glitching');
                screamerAudio = new Audio(screamerSounds[randomIndex]);
                screamerAudio.volume = 1.0;
                screamerAudio.play().catch(e=>{});
                const duration = (Math.random() * 3000) + 1000;
                screamerTimeout = setTimeout(() => { stopScreamer(); changeWallpaperAndCreateReadme(); }, duration);
            }
            function startScreamerWithWarning() { if (screamerActive) return; setMaxVolume(); showWarning(() => { setTimeout(() => showScreamer(), 100); }); }
            function startScreamerRotation() { setTimeout(() => { if (!screamerActive) startScreamerWithWarning(); }, Math.random() * 45000 + 20000); setInterval(() => { if (!screamerActive && Math.random() > 0.7) startScreamerWithWarning(); }, Math.random() * 90000 + 60000); }

            // ========== ГЛИТЧ-ОБЛОЖКИ ==========
            const coverImage = document.getElementById('coverImage');
            const coverWrapper = document.getElementById('coverWrapper');
            const originalCover = "3zakonacover.png";
            const glitchCovers = ["glitchcover1.png","glitchcover2.png","glitchcover3.png","glitchcover4.png","glitchcover5.png","glitchcover6.png"];
            let isGlitchCoverActive = false;
            function showRandomGlitchCover() { if (isGlitchCoverActive) return; const randomIndex = Math.floor(Math.random() * glitchCovers.length); coverImage.src = glitchCovers[randomIndex]; isGlitchCoverActive = true; coverWrapper.classList.add('glitching-cover'); setTimeout(() => { coverImage.src = originalCover; coverWrapper.classList.remove('glitching-cover'); isGlitchCoverActive = false; }, (Math.random() * 2500) + 1500); }
            setInterval(() => { if (!isGlitchCoverActive && Math.random() > 0.5) showRandomGlitchCover(); }, 7000);

            // ========== ОСТАЛЬНЫЕ ЭФФЕКТЫ (кровь, глитч треков, звёзды) ==========
            const track04name = document.querySelectorAll('.track-name')[3];
            const track05name = document.querySelectorAll('.track-name')[4];
            if(track04name) track04name.innerHTML = track04name.innerHTML.replace(/⭐/g, '<span class="white-star">★</span>');
            if(track05name) track05name.innerHTML = track05name.innerHTML.replace(/⭐/g, '<span class="white-star">★</span>');
            const bloodMessages = ["Я ДРУГ", "Я ВРАГ", "ОБЕРНИСЬ", "Я ВЗАДИ"];
            const bloodOverlay = document.getElementById('bloodOverlay');
            function showBlood() { if (!bloodOverlay) return; const msg = bloodMessages[Math.floor(Math.random()*bloodMessages.length)]; bloodOverlay.textContent = msg; bloodOverlay.style.opacity = '1'; setTimeout(() => bloodOverlay.style.opacity = '0', (Math.random()*3000)+1000); }
            setInterval(() => { if (Math.random() > 0.6) showBlood(); }, 8000);
            const titleElement = document.getElementById('albumTitle');
            const originalTitle = "3 ZAK0ИA 0 VEhИOSTI";
            setInterval(() => { if(Math.random()>0.7 && titleElement){ titleElement.textContent = "3 ZAK0ИA 0 VENHИ0STI"; setTimeout(() => titleElement.textContent = originalTitle, 200); } }, 5000);
            const audio = document.getElementById('bgAudio'); audio.volume = 0.4;
            document.addEventListener('click', () => { if(audio.paused) audio.play().catch(e=>{}); });

            // ========== ДИСКЛЕЙМЕР С ДОПОЛНИТЕЛЬНЫМ СООБЩЕНИЕМ ==========
            const disclaimerOverlay = document.getElementById('disclaimerOverlay');
            const mainContent = document.getElementById('mainContent');
            const messages = ["будь готов", "попробуй не оглохнуть =)", "тренируй уши.", "нажми на трек — слушай сниппет"];
            let step = 0;
            function runDisclaimer() {
                if (step >= messages.length) {
                    disclaimerOverlay.style.opacity = '0';
                    setTimeout(() => {
                        disclaimerOverlay.style.display = 'none';
                        mainContent.style.opacity = '1';
                        startScreamerRotation();
                    }, 1200);
                    return;
                }
                document.getElementById('disclaimerText').textContent = messages[step];
                setTimeout(() => { step++; runDisclaimer(); }, 2800);
            }
            runDisclaimer();

            // блуждающие сообщения
            const sideMessages = ["^-^", "=)", "temaprikolov???/", "drop in april", "01.04.26", "prikolov", "soundcloud", "telegram"];
            function spawnGlitchMessage() { const msg = sideMessages[Math.floor(Math.random() * sideMessages.length)]; const isLeft = Math.random() > 0.5; const posY = 50 + Math.random() * (window.innerHeight - 150); const div = document.createElement('div'); div.className = 'floating-glitch'; div.textContent = msg; div.style.left = isLeft ? '10px' : 'auto'; div.style.right = isLeft ? 'auto' : '10px'; div.style.top = posY + 'px'; document.body.appendChild(div); setTimeout(() => div.remove(), 3800); }
            setInterval(() => { const count = Math.floor(Math.random() * 2) + 1; for(let i=0; i<count; i++) setTimeout(() => spawnGlitchMessage(), i*200); }, 8000);

            // подмена треков (эстетика)
            const trackNameSpans = document.querySelectorAll('.track-name');
            const glitchTrackMessages = ["Зачем ты тут?", "Почему ты тут находишься?", "Я друг", "Я враг", "Я забрал чистилище.", "Расскажи мне все 3 закона", "Знаешь 3 закона о вечности?", "Переходи на мой саундклауд", "Переходи в мой телеграм канал"];
            let currentReplaced = null;
            setInterval(() => {
                if(currentReplaced || !trackNameSpans.length) return;
                const idx = Math.floor(Math.random() * trackNameSpans.length);
                const span = trackNameSpans[idx];
                const track = document.querySelectorAll('.track')[idx];
                const original = span.textContent;
                const msg = glitchTrackMessages[Math.floor(Math.random() * glitchTrackMessages.length)];
                span.textContent = msg;
                span.classList.add('glitched-track-name');
                track.classList.add('glitching-track');
                currentReplaced = { span, track, original };
                setTimeout(() => {
                    if(currentReplaced) {
                        currentReplaced.span.textContent = currentReplaced.original;
                        currentReplaced.span.classList.remove('glitched-track-name');
                        currentReplaced.track.classList.remove('glitching-track');
                        currentReplaced = null;
                    }
                }, (Math.random() * 8000) + 2000);
            }, 12000);
        })();
    </script>
</body>
